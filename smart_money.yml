## .github/workflows/smart_money.yml — diff

Add ONE new step after the existing pipeline step. No other changes needed.
The new step uses the same CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_API_TOKEN
secrets that smart_money_api.py already uses.

```diff
       - name: Run Smart Money Pipeline (API mode)
         run: python smart_money_api.py --lookback-days 14
+      - name: Dump per-wallet lifecycles for retrospective analysis
+        run: python dump_lifecycles.py --lookback-days 60 --commit
```

## Full file after the change:

```yaml
name: JAKUU Smart Money Pipeline
on:
  schedule:
    - cron: "0 */4 * * 1-5"
    - cron: "0 8,20 * * 0,6"
  workflow_dispatch:
    inputs:
      lifecycles_lookback_days:
        description: "Lookback days for dump_lifecycles.py (one-shot deep backfills)"
        required: false
        default: "60"
env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  smart-money:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run Smart Money Pipeline (API mode)
        run: python smart_money_api.py --lookback-days 14
      - name: Dump per-wallet lifecycles for retrospective analysis
        run: python dump_lifecycles.py --lookback-days ${{ github.event.inputs.lifecycles_lookback_days || '60' }} --commit
```

## Notes on the YAML changes

1. `timeout-minutes: 30 → 90` — the new step adds ~5-10 min depending on wallet
   count and trade volume. 90 is comfortable.

2. `workflow_dispatch.inputs.lifecycles_lookback_days` — adds a manual-run knob
   so you can do a one-shot deep backfill (e.g., 180 days) without editing the
   YAML. Defaults to 60 days for the scheduled cron runs.

3. The new step uses `--commit` because we want the scheduled cron to actually
   write data. Manual one-shot runs that just want a preview should use the
   `workflow_dispatch` UI to override behavior, or run locally with `--dry-run`.

4. Same Python version (3.12) and same dependency (`requests`) — no new install
   step required.
