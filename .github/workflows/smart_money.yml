name: JAKUU Smart Money Pipeline
on:
  schedule:
    - cron: "0 */4 * * 1-5"
    - cron: "0 8,20 * * 0,6"
  workflow_dispatch:
env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  smart-money:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      # TEMPORARY S147: skip smart_money_api to reserve full 90min for dump.
      # Cron at :00 every 4h still refreshes signals separately.
      # Restore by removing the `if: false` line below.
      - name: Run Smart Money Pipeline (API mode)
        if: false
        run: python smart_money_api.py --lookback-days 14
      - name: Dump per-wallet lifecycles for retrospective analysis
        run: python dump_lifecycles.py --lookback-days 60 --commit
