name: JAKUU Smart Money Pipeline
on:
  schedule:
    - cron: "0 */4 * * 1-5"   # Every 4h weekdays
    - cron: "0 8,20 * * 0,6"  # 2x/day weekends
  workflow_dispatch:
env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
jobs:
  smart-money:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # S86: API mode runs in ~30s, no more 37GB download
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run Smart Money Pipeline (API mode)
        run: python smart_money_api.py --lookback-days 14
